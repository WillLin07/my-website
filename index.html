<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>账密提交</title>
</head>
<body>
<form action="/api/login" method="post">
  <div>
    <label for="username">账号：</label>
    <input type="text" id="username" name="user_account" placeholder="请输入账号" required>
  </div>
  <br>
  <div>
    <label for="password">密码：</label>
    <input type="password" id="password" name="user_password" placeholder="请输入密码" required>
  </div>
  <br>
  <button type="submit">立即登录（实验提交）</button>
</form>
</body>
</html>
